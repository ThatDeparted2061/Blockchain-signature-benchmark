name: Build & Release Benchmark Results

on:
  workflow_dispatch:

concurrency:
  group: release-results-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark
        run: |
          mkdir -p results/graphs
          python3 benchmark_complete.py

      - name: Prepare release folder
        run: |
          RELEASE_TAG=benchmark-${{ github.run_number }}
          RELEASE_DIR=results/${RELEASE_TAG}
          mkdir -p "${RELEASE_DIR}/graphs"

          # Copy CSVs and graphs explicitly so RELEASE_DIR is never copied into itself.
          find results -maxdepth 1 -name "*.csv" -exec cp {} "${RELEASE_DIR}/" \;
          find results/graphs -maxdepth 1 -name "*.png" \
            -exec cp {} "${RELEASE_DIR}/graphs/" \; 2>/dev/null || true

          echo "RELEASE_TAG=${RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "RELEASE_DIR=${RELEASE_DIR}" >> "$GITHUB_ENV"

      - name: Commit release artifacts into results/
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add results/
          if ! git diff --cached --quiet; then
            git commit -m "chore: store benchmark results ${RELEASE_TAG}"
          else
            echo "No changes to commit — skipping."
            exit 0
          fi

          # Sync with remote to avoid non-fast-forward failures.
          git fetch origin master
          git rebase origin/master

          # Retry push a few times in case of concurrent runs.
          for i in 1 2 3 4 5; do
            if git push origin HEAD:master; then
              exit 0
            fi
            echo "Push failed (attempt ${i}/5). Rebasing and retrying…"
            git fetch origin master
            git rebase origin/master
            sleep $((i * 2))
          done

          echo "❌ Push failed after 5 attempts."
          exit 1

      - name: Upload results as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ env.RELEASE_TAG }}
          path: ${{ env.RELEASE_DIR }}/
          if-no-files-found: error

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: Benchmark Results #${{ github.run_number }}
          generateReleaseNotes: true
          artifacts: >
            ${{ env.RELEASE_DIR }}/*.csv,
            ${{ env.RELEASE_DIR }}/graphs/*.png
          allowUpdates: true
          replacesArtifacts: true