name: Build & Release Benchmark Results

on:
  push:
    branches:
      - master

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install matplotlib || true

      - name: Run benchmark (smoke/full configurable)
        run: |
          mkdir -p results
          # Run full benchmark but cap at 3072 by default to avoid extremely long runs on GH runners
          python ecdsa_vs_rsa_benchmark.py --warmup 1 --iters 3  --out results/benchmark_results_comprehensive.csv

      - name: Generate plots
        run: |
          python results/plot_results.py --csv results/benchmark_results_comprehensive.csv --outdir results

      - name: Create observations
        run: |
          cat > results/observations.md <<'EOF'
          # Observations for benchmark run

          This release was generated automatically by the CI pipeline. It includes the following artifacts:

          - results/benchmark_results_comprehensive.csv: raw CSV data used for plots
          - results/*.png: generated graphs

          Please review the CSV for detailed numbers. If you need a full run for the largest RSA sizes, re-run locally on a larger machine.
          EOF

      - name: Create and push tag
        id: create_tag
        run: |
          TAG="v${{ github.run_number }}-${{ github.sha }}"
          echo "Creating tag $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "CI release $TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}-${{ github.sha }}
          name: Release ${{ github.run_number }}
          files: |
            results/benchmark_results_comprehensive.csv
            results/*.png
            results/observations.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
