name: Build & Release Benchmark Results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run benchmark
        run: |
          mkdir -p results
          python3 benchmark_complete.py

      - name: Prepare release folder in results/
        run: |
          RELEASE_TAG=benchmark-${{ github.run_number }}
          RELEASE_DIR=results/${RELEASE_TAG}
          mkdir -p "${RELEASE_DIR}"
          shopt -s dotglob
          cp -r results/* "${RELEASE_DIR}/" || true
          shopt -u dotglob
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV
          echo "RELEASE_DIR=${RELEASE_DIR}" >> $GITHUB_ENV

      - name: Commit release artifacts into results/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "chore: store release ${RELEASE_TAG} results" || echo "No changes to commit"
          git push

      - name: Upload results as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ env.RELEASE_TAG }}
          path: ${{ env.RELEASE_DIR }}/

      - name: Create GitHub Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: Benchmark Results #${{ github.run_number }}
          generateReleaseNotes: true
          artifacts: ${{ env.RELEASE_DIR }}/**
          allowUpdates: true
          replacesArtifacts: true
